<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test API PC Store</title>
</head>
<body>
  <h1>Tester API PC Store</h1>

  <button id="registerBtn">Créer utilisateur</button>
  <button id="loginBtn">Connexion</button>
  <button id="getProductsBtn">Voir produits</button>

  <pre id="output"></pre>

  <script>
    const output = document.getElementById('output');

    const apiUrl = "http://localhost:3000";

    // 1️⃣ Créer utilisateur
    document.getElementById('registerBtn').onclick = async () => {
      const res = await fetch(apiUrl + '/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: 'test@test.com', password: '123456' })
      });
      const data = await res.json();
      output.textContent = JSON.stringify(data, null, 2);
    };

    // 2️⃣ Connexion
    let token = '';
    document.getElementById('loginBtn').onclick = async () => {
      const res = await fetch(apiUrl + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: 'test@test.com', password: '123456' })
      });
      const data = await res.json();
      token = data.token;
      output.textContent = JSON.stringify(data, null, 2);
    };

    // 3️⃣ Voir les produits
    document.getElementById('getProductsBtn').onclick = async () => {
      const res = await fetch(apiUrl + '/products', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      output.textContent = JSON.stringify(data, null, 2);
    };
  </script>
</body>
</html>
